name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_healthcheck:
        description: "Skip post-deploy /healthz (first boot / long backfill)"
        type: boolean
        default: false

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy --strict src/
      - run: uv run pytest -m "not integration"

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: uv sync --frozen
      - name: Start compose stack
        working-directory: .
        run: docker compose -f deploy/compose.dev.yml up -d --wait
      - name: Configure env
        working-directory: .
        run: |
          set -a
          # shellcheck disable=SC1091
          source .env.example
          set +a
          echo "EXPLORER_NETWORK=$EXPLORER_NETWORK" >> "$GITHUB_ENV"
          echo "EXPLORER_RPC_URL=$EXPLORER_RPC_URL" >> "$GITHUB_ENV"
          echo "EXPLORER_RPC_USER=$EXPLORER_RPC_USER" >> "$GITHUB_ENV"
          echo "EXPLORER_RPC_PASSWORD=$EXPLORER_RPC_PASSWORD" >> "$GITHUB_ENV"
          echo "EXPLORER_ZMQ_RAWBLOCK=$EXPLORER_ZMQ_RAWBLOCK" >> "$GITHUB_ENV"
          echo "EXPLORER_ZMQ_HASHTX=$EXPLORER_ZMQ_HASHTX" >> "$GITHUB_ENV"
          echo "EXPLORER_DB_URL=$EXPLORER_DB_URL" >> "$GITHUB_ENV"
          echo "EXPLORER_DB_SCHEMA=$EXPLORER_DB_SCHEMA" >> "$GITHUB_ENV"
          echo "EXPLORER_SYNC_POLL_INTERVAL_SEC=$EXPLORER_SYNC_POLL_INTERVAL_SEC" >> "$GITHUB_ENV"
          echo "EXPLORER_MAX_REORG_DEPTH=$EXPLORER_MAX_REORG_DEPTH" >> "$GITHUB_ENV"
          echo "EXPLORER_API_NETWORKS=$EXPLORER_API_NETWORKS" >> "$GITHUB_ENV"
          echo "EXPLORER_API_MAX_LAG=$EXPLORER_API_MAX_LAG" >> "$GITHUB_ENV"
          echo "EXPLORER_REGTEST_RPC_URL=$EXPLORER_REGTEST_RPC_URL" >> "$GITHUB_ENV"
          echo "EXPLORER_REGTEST_RPC_USER=$EXPLORER_REGTEST_RPC_USER" >> "$GITHUB_ENV"
          echo "EXPLORER_REGTEST_RPC_PASSWORD=$EXPLORER_REGTEST_RPC_PASSWORD" >> "$GITHUB_ENV"
      - name: Migrate database
        run: uv run alembic upgrade head
      - name: Run integration tests
        run: uv run pytest -m integration -v
      - name: Compose logs on failure
        if: failure()
        working-directory: .
        run: docker compose -f deploy/compose.dev.yml logs --tail=200
      - name: Tear down compose
        if: always()
        working-directory: .
        run: docker compose -f deploy/compose.dev.yml down -v

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Start compose stack (node + postgres + api)
        run: docker compose -f deploy/compose.dev.yml --profile api up -d --wait
      - name: Configure env
        run: |
          set -a
          # shellcheck disable=SC1091
          source .env.example
          set +a
          {
            echo "EXPLORER_NETWORK=$EXPLORER_NETWORK"
            echo "EXPLORER_RPC_URL=$EXPLORER_RPC_URL"
            echo "EXPLORER_RPC_USER=$EXPLORER_RPC_USER"
            echo "EXPLORER_RPC_PASSWORD=$EXPLORER_RPC_PASSWORD"
            echo "EXPLORER_ZMQ_RAWBLOCK=$EXPLORER_ZMQ_RAWBLOCK"
            echo "EXPLORER_ZMQ_HASHTX=$EXPLORER_ZMQ_HASHTX"
            echo "EXPLORER_DB_URL=$EXPLORER_DB_URL"
            echo "EXPLORER_DB_SCHEMA=$EXPLORER_DB_SCHEMA"
            echo "EXPLORER_SYNC_POLL_INTERVAL_SEC=$EXPLORER_SYNC_POLL_INTERVAL_SEC"
            echo "EXPLORER_MAX_REORG_DEPTH=$EXPLORER_MAX_REORG_DEPTH"
            echo "EXPLORER_API_NETWORKS=$EXPLORER_API_NETWORKS"
            echo "EXPLORER_API_MAX_LAG=$EXPLORER_API_MAX_LAG"
            echo "EXPLORER_REGTEST_RPC_URL=$EXPLORER_REGTEST_RPC_URL"
            echo "EXPLORER_REGTEST_RPC_USER=$EXPLORER_REGTEST_RPC_USER"
            echo "EXPLORER_REGTEST_RPC_PASSWORD=$EXPLORER_REGTEST_RPC_PASSWORD"
            echo "PLAYWRIGHT_BASE_URL=http://localhost:3000"
            echo "PLAYWRIGHT_API_BASE=http://127.0.0.1:8080"
          } >> "$GITHUB_ENV"
      - name: Install backend
        working-directory: backend
        run: uv sync --frozen
      - name: Install web + Playwright
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install --with-deps chromium
      - name: Start Next.js dev server
        working-directory: web
        run: |
          pnpm dev &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000 >/dev/null; then
              echo "dev server ready"
              exit 0
            fi
            sleep 2
          done
          echo "dev server failed to start"
          exit 1
      - name: Run Playwright e2e
        working-directory: web
        run: pnpm test:e2e
      - name: Compose logs on failure
        if: failure()
        run: docker compose -f deploy/compose.dev.yml --profile api logs --tail=200
      - name: Tear down compose
        if: always()
        run: docker compose -f deploy/compose.dev.yml --profile api down -v

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f deploy/compose.dev.yml config -q

  prod-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compose prod config
        run: |
          docker compose --env-file deploy/.env.prod.example \
            -f deploy/compose.prod.yml config -q
      - name: Nginx config test (certs absent)
        run: |
          docker run --rm \
            --add-host=api:127.0.0.1 \
            -v "$PWD/deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro" \
            -v "$PWD/deploy/nginx/includes:/etc/nginx/includes:ro" \
            -v "$PWD/deploy/nginx/templates:/etc/nginx/templates:ro" \
            -v "$PWD/deploy/nginx/docker-entrypoint.sh:/docker-entrypoint-explorer.sh:ro" \
            nginx@sha256:97d490c12ba55b4946b01546d1c3ed324e8d41ab1c9fcb2a616aa470620e5b46 \
            /bin/sh /docker-entrypoint-explorer.sh nginx -t

  publish:
    needs: [backend, integration, web, e2e, compose-validate, prod-validate]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push explorer-backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/explorer.Dockerfile
          push: true
          tags: |
            ghcr.io/cykuza/explorer-backend:latest
            ghcr.io/cykuza/explorer-backend:${{ github.sha }}
      - name: Build and push explorer-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/web.Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_NETWORKS=mainnet,testnet
          tags: |
            ghcr.io/cykuza/explorer-web:latest
            ghcr.io/cykuza/explorer-web:${{ github.sha }}
      - name: Detect cyberyend Dockerfile changes
        id: cyberyend
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="$(git rev-parse HEAD^ 2>/dev/null || true)"
            fi
          else
            BASE="${{ github.event.before }}"
          fi
          changed=false
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            # First push of the branch or missing before SHA: rebuild.
            changed=true
          elif git diff --name-only "$BASE" "${{ github.sha }}" \
            | grep -qx 'deploy/docker/cyberyend.Dockerfile'; then
            changed=true
          elif ! docker buildx imagetools inspect \
            "ghcr.io/cykuza/cyberyend:0.21.6.1" >/dev/null 2>&1; then
            # Bootstrap: image not yet on GHCR.
            changed=true
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
      - name: Build and push cyberyend
        if: steps.cyberyend.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/cyberyend.Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/cykuza/cyberyend:0.21.6.1

  deploy:
    needs: [backend, integration, web, e2e, compose-validate, prod-validate, publish]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy secrets
        id: gate
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "${DEPLOY_SSH_HOST}" ] || [ -z "${DEPLOY_SSH_USER}" ] || [ -z "${DEPLOY_SSH_KEY}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets unset; skipping deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.ready == 'true'
      - uses: webfactory/ssh-agent@v0.9.0
        if: steps.gate.outputs.ready == 'true'
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Add host to known_hosts
        if: steps.gate.outputs.ready == 'true'
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_HOST_KEY: ${{ secrets.DEPLOY_SSH_HOST_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          PORT="${DEPLOY_SSH_PORT:-22}"
          if [ -n "${DEPLOY_SSH_HOST_KEY}" ]; then
            printf '%s\n' "${DEPLOY_SSH_HOST_KEY}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${PORT}" -t ed25519 "${DEPLOY_SSH_HOST}" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts
      - name: Rsync deploy files
        if: steps.gate.outputs.ready == 'true'
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${DEPLOY_SSH_PORT:-22}"
          rsync -avz -e "ssh -p ${PORT}" \
            deploy/compose.prod.yml \
            deploy/README.md \
            deploy/nginx \
            "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:/opt/explorer/"
      - name: Pull and up
        if: steps.gate.outputs.ready == 'true'
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -p "${PORT}" "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}" \
            "cd /opt/explorer && \
             EXPLORER_TAG=${{ github.sha }} docker compose -f compose.prod.yml --env-file .env.prod pull && \
             EXPLORER_TAG=${{ github.sha }} docker compose -f compose.prod.yml --env-file .env.prod up -d --remove-orphans"
      - name: Healthcheck
        if: |
          steps.gate.outputs.ready == 'true'
          && (github.event_name != 'workflow_dispatch' || inputs.skip_healthcheck != true)
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -p "${PORT}" "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}" bash -s <<'EOF'
          set -euo pipefail
          for attempt in $(seq 1 10); do
            if curl -fsS localhost/healthz; then
              echo
              echo "healthz ok (attempt ${attempt})"
              exit 0
            fi
            echo "healthz not ready (attempt ${attempt}); sleeping $((attempt * 3))s"
            sleep $((attempt * 3))
          done
          echo "healthz failed after 10 attempts" >&2
          exit 1
          EOF
