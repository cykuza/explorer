# ACME HTTP-01 (certbot webroot)
location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    allow all;
}

# Default network (mainnet) de-duplication: /mainnet/... → /...
rewrite ^/mainnet/(.*)$ /$1 permanent;

# Pretty entity URLs → static shell pages (default network)
location ~ ^/(block|tx|address)/[^/]+/?$ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    rewrite ^/(block|tx|address)/[^/]+/?$ /$1.html last;
}

# Network-prefixed pretty entity URLs → /{network}/{entity}.html
location ~ ^/(testnet)/(block|tx|address)/[^/]+/?$ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    rewrite ^/(testnet)/(block|tx|address)/[^/]+/?$ /$1/$2.html last;
}

# --- SSE (no cache, long read timeout, tight conn limit) ---
location ~ ^/api/v1/[^/]+/events/?$ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 2;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    chunked_transfer_encoding off;
}

# --- Strict rate-limited API paths ---
location ~ ^/api/v1/[^/]+/address/[^/]+/txs {
    limit_req zone=strict burst=5 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache off;
}

location ~ ^/api/v1/[^/]+/stats/charts {
    limit_req zone=strict burst=5 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 60s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
}

location ~ ^/api/v1/[^/]+/search/ {
    limit_req zone=strict burst=5 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache off;
}

# --- Cached API tiers ---
# tip / mempool: 2s
location ~ ^/api/v1/[^/]+/tip/?$ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 2s;
    proxy_cache_lock on;
}

location ~ ^/api/v1/[^/]+/mempool {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 2s;
    proxy_cache_lock on;
}

# blocks list: 5s
location ~ ^/api/v1/[^/]+/blocks/?$ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 5s;
    proxy_cache_lock on;
}

# latest txs list: 5s (must precede /tx/{txid})
location ~ ^/api/v1/[^/]+/txs/?$ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 5s;
    proxy_cache_lock on;
}

# block-by-id / tx / mweb/summary: 60s + stale-while-updating
location ~ ^/api/v1/[^/]+/block/[^/]+ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 60s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
}

location ~ ^/api/v1/[^/]+/tx/[^/]+ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 60s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
}

location ~ ^/api/v1/[^/]+/mweb/summary {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 60s;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_lock on;
}

location = /healthz {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache api_cache;
    proxy_cache_valid 200 2s;
    proxy_cache_lock on;
}

# Remaining API (legacy + openapi/docs)
location /api/ {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    proxy_pass http://explorer_api;
    include /etc/nginx/includes/proxy_params.conf;
    proxy_cache off;
}

# Next.js OG image is exported without an extension; force image/png for crawlers.
location = /opengraph-image {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    default_type image/png;
    try_files $uri =404;
}

# Static export
location / {
    limit_req zone=general burst=20 nodelay;
    limit_req zone=global burst=200 nodelay;
    limit_conn addr 10;
    try_files $uri $uri.html $uri/index.html =404;
}
