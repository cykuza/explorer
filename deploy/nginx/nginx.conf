worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache=$upstream_cache_status';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    server_tokens off;
    client_max_body_size 1k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types application/json application/javascript text/css text/plain;

    # Rate-limit zones (per-IP abuser caps + server-wide aggregate cap)
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=strict:10m rate=2r/s;
    limit_req_zone $server_name zone=global:1m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    limit_req_status 429;
    limit_conn_status 429;

    # ~100 MB API response cache
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=10m use_temp_path=off;

    upstream explorer_api {
        server api:8080;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
