# HTTP-only mode (TLS certs not yet present). Entrypoint installs this as
# conf.d/00-http.conf when /etc/nginx/certs/{fullchain,privkey}.pem are absent.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/includes/locations.conf;
}
