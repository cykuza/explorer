# HTTP → HTTPS redirect (installed when TLS certs are present).
# ACME challenges stay on HTTP for renewals.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
